<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Oud | Luxury Fragrances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <nav class="p-8 flex justify-between items-center border-b border-white/5 uppercase tracking-[0.4em] text-[10px]">
        <div class="text-xl font-bold gold-text tracking-[0.8em]">VELVET OUD</div>
        <div class="space-x-12 hidden md:flex">
            <a href="#" class="hover:text-gray-400 transition">The Collection</a>
            <a href="#" class="hover:text-gray-400 transition">Bespoke Scents</a>
        </div>
        <div class="border border-white/20 px-4 py-1">CART (0)</div>
    </nav>
    <header class="relative h-[70vh] flex items-center justify-center overflow-hidden border-b border-white/5">
    <img src="https://images.unsplash.com/photo-1583445013765-48c220017144?w=1200" class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale" alt="Luxury Oud">
    <div class="relative z-10 text-center px-6">
        <h1 class="serif text-5xl md:text-8xl italic mb-6 gold-text">Ancient Resin. <br>Modern Desire.</h1>
        <p class="uppercase tracking-[0.5em] text-[10px] text-gray-400">The Niche Collection '26</p>
    </div>
</header>
<section class="max-w-7xl mx-auto py-24 px-6">
    <h2 class="serif text-4xl mb-16 italic text-center gold-text">The 2026 Collection</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-10">
        
        <script>
            const grid = document.querySelector('.grid');
            const titles = [
                "Oud Noir", "Golden Amber", "Desert Rose", "Velvet Musk", "Royal Incense",
                "Silver Birch", "Night Jasmine", "Tobacco Leaf", "Citrus Grove", "Ethereal Mist",
                "Midnight Rain", "Oceania", "Silk Road", "Forest Floor", "Black Pepper",
                "Vanilla Sky", "Leather Oud", "Spiced Chai", "Saffron Sun", "Deep Forest",
                "Amber Glow", "White Tea", "Purple Haze", "Cacao Dreams", "Spiced Plum",
                "Winter Woods", "Sunkissed", "Moonlight", "Old Book", "Wild Fern"
            ];

            titles.forEach((title, i) => {
                const price = Math.floor(Math.random() * (350 - 150) + 150);
                const html = `
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] overflow-hidden bg-zinc-900 mb-4 border border-white/5">
                        <img src="https://picsum.photos/500/700?random=${i}" 
                             alt="${title}" 
                             class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700"
                             onerror="this.src='https://placehold.jp/24/1a1a1a/ffffff/300x400.png?text=Luxury+Scent'">
                    </div>
                    <h3 class="serif text-lg">${title}</h3>
                    <p class="font-bold text-white/90">$${price}</p>
                </div>`;
                grid.innerHTML += html;
            });
        </script>

    </div>
</section>

        
            

       

        
        
        

</body>
</html>
